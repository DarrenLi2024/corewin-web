<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080C14"/>
      <stop offset="100%" style="stop-color:#0D1525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="#1E2D45" opacity="0.6"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Glow -->
  <ellipse cx="600" cy="200" rx="500" ry="200" fill="#00D4FF" opacity="0.04"/>
  <!-- Logo -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="#00D4FF" fill-opacity="0.1"/>
    <rect x="2" y="2" width="52" height="52" rx="12" stroke="#00D4FF" stroke-opacity="0.4" fill="none" stroke-width="1"/>
    <path d="M14 14h8v12l8-12h9l-10.5 14 11.5 14H30l-8.5-12-8 11.5V14z" fill="#00D4FF"/>
  </g>
  <!-- Brand name -->
  <text x="156" y="122" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#F0F4FF">CoreWin</text>
  <text x="156" y="148" font-family="system-ui, sans-serif" font-size="14" fill="#64748B" letter-spacing="0.05em">TECHNOLOGY</text>
  <!-- Headline -->
  <text x="80" y="340" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="#F0F4FF">
    <tspan fill="url(#accent)">Authorized</tspan>
  </text>
  <text x="80" y="420" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="#F0F4FF">Semiconductor</text>
  <text x="80" y="500" font-family="system-ui, sans-serif" font-size="56" font-weight="700" fill="#F0F4FF">Distributor</text>
  <!-- Brands -->
  <g transform="translate(80, 560)">
    <text font-family="monospace" font-size="12" fill="#4A5568">ROHM</text>
    <text x="80" font-family="monospace" font-size="12" fill="#4A5568">ST</text>
    <text x="130" font-family="monospace" font-size="12" fill="#4A5568">TI</text>
    <text x="170" font-family="monospace" font-size="12" fill="#4A5568">MPS</text>
    <text x="220" font-family="monospace" font-size="12" fill="#4A5568">3PEAK</text>
    <text x="290" font-family="monospace" font-size="12" fill="#4A5568">GPT</text>
  </g>
</svg>
